<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Happy - Mapa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style-2.css">
  </head>
  <body>
      
    <div class="container-fluid p-0">
        <div class="row g-0 min-vh-500">
          
          <div class="col-auto collat">
            <img src="imgs/Botões.png" alt="Barra Lateral">
       
        </div>

          <div class="col d-flex justify-content-center align-items-start" style="background-color: #CEDEE5; height: 230vh;">
    
            <div class="mt-5 bg-white p-5 rounded-4 shadow-sm" style="width: 100%; max-width: 700px; height: 1700px;">                
                <h3 class="fw-bold dados" style="color: #4D6F80; margin-bottom: 0;">Dados</h3>                
                <hr style="opacity: 0.1; color: #D3E2E5; margin: 24px 0;"> 
                     
                    <div class="caixa-mapa bg-light border rounded-4 mb-4 d-flex flex-column justify-content-center align-items-center" style="height: 300px;">
                    </div>  
                    
                    <div class="mb-3">
                          <label class="form-label titulocard">Nome</label>
                          <input type="text" class="inputnome form-control" rows="3"></input>
                     </div>   

                    <div class="mb-3">
                          <label class="form-label titulocard">Sobre<span class="maxcrt">(Máximo 300 caracteres)</span></label>
                          <textarea class="inputsobre form-control" rows="3"></textarea>
                     </div>
                     
                    <div class="mb-3">
                          <label class="form-label titulocard">Número de Whatsapp</label>
                          <input type="text" class="inputnome form-control" rows="3"></input>
                     </div> 

                     <div class="mb-3">
                          <label class="form-label titulocard">Foto</label>
                          <div class="caixa-upload-foto bg-light rounded-4 d-flex justify-content-center align-items-center">
                                <span class="fs-1 fw-bold" style="color: #29B6D1;">+</span>
                          </div>
                            
                          <div>
                              
                              <h3 class="fw-bold dados" style="color: #4D6F80; margin-bottom: 0; margin-top: 50px;">Visitação</h3>                
                              <hr style="opacity: 0.1; color: #D3E2E5; margin: 24px 0;">
                              
                              <div class="mb-3">
                                   <label class="form-label titulocard">Instruções</label>
                                   <textarea class="inputsobre form-control" rows="3"></textarea>
                              </div>
                              
                              <div class="mb-3">
                                   <label class="form-label titulocard">Horário das Visitas</label>
                                   <input type="text" class="inputnome form-control" rows="3"></input>
                              </div> 

                              <div class="atende">
                                <label class="form-label titulocard">Atende final de semana?</label>
                                <img src="imgs/Group 11.png" class="sn" alt="">
                                
                              </div>

                          </div>
                     </div> 
        
                     <button class="continuar">Confirmar</button>
            </div>

            

          </div>

        </div>
    </div>


  </body>
</html>
